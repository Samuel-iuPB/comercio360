<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comercio360 — Iniciar sesión</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Comercio360">
    </div>
    <p class="login-subtitle">Sistema de Punto de Venta</p>

    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Iniciar Sesión</button>
    <div class="login-error" id="loginError"></div>

    <div class="login-hints">
      Admin: <code>admin / admin123</code> &nbsp;·&nbsp; Cajero: <code>cajero / cajero123</code>
    </div>
  </div>

  <script>
    // Si ya hay sesión, redirigir
    fetch('/api/me').then(r => r.json()).then(data => {
      if (data.role) {
        window.location.href = data.role === 'admin' ? '/dashboard.html' : '/index.html';
      }
    }).catch(() => {});

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    async function doLogin() {
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('loginError');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('Completa usuario y contraseña'); return; }
      btn.textContent = 'Verificando...';
      btn.disabled = true;
      err.classList.remove('show');
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = data.user.role === 'admin' ? '/dashboard.html' : '/index.html';
        } else {
          showError(data.error || 'Error de autenticación');
          btn.textContent = 'Iniciar Sesión';
          btn.disabled = false;
        }
      } catch(e) {
        showError('Error de conexión con el servidor');
        btn.textContent = 'Iniciar Sesión';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const err = document.getElementById('loginError');
      err.textContent = msg;
      err.classList.add('show');
    }
  </script>
</body>
</html>
